<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mamut Galàctic — Shop</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/apple-touch-icon-light.png" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32-light.png" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/png" sizes="16x16" href="./assets/favicon-16x16-light.png" media="(prefers-color-scheme: light)">
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/apple-touch-icon.png" media="(prefers-color-scheme: dark)">
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.png" media="(prefers-color-scheme: dark)">
    <link rel="icon" type="image/png" sizes="16x16" href="./assets/favicon-16x16.png" media="(prefers-color-scheme: dark)">
    <title>Mamut Galàctic Records — Shopgit </title>
<meta name="robots" content="noindex">
<link rel="canonical" href="https://www.mamutgalacticrecords.com/shop.html">
</head>
<body>
<header>
  <div class="headcontainer">
    <h1><a href="index.html">Mamut Galàctic</a></h1>
    <div class="icons">
        <a href="https://www.instagram.com/mamutgalacticrecords/" title="Instagram" target="_blank" rel="noopener"><i class="fa-brands fa-instagram"></i></a>
        <a href="https://mamutgalacticrecords.bandcamp.com/community" title="Bandcamp" target="_blank" rel="noopener"><i class="fa-brands fa-bandcamp"></i></a>
        <a href="https://www.youtube.com/@mamutgalacticrecords" title="Youtube" target="_blank" rel="noopener"><i class="fa-brands fa-youtube"></i></a>
    </div>
    <nav>
        <a href="#novetats">Novetats</a>
        <a href="#llançaments">Llançaments</a>
        <a href="shop.html">Shop</a>
    </nav>
  </div>
</header>
<div class="container">
<h2 id="botiga">Botiga</h2>
<div id="botigaflex">

    <!-- Producte AMB talles (samarreta) -->
    <article class="product">
        <div class="product-media">
            <img src="./assets/samarreta.jpg" alt="Samarreta Mamut Galàctic">
        </div>
        <div class="product-body">
            <p class="product-name">Samarreta Mamut Galàctic</p>
            <p class="product-price">25 €</p>
            <p class="product-sizes-label">Talla:</p>
            <div class="product-sizes" role="group" aria-label="Tria de talla">
                <button class="size" aria-pressed="false" data-link="#">S</button>
                <button class="size" aria-pressed="false" data-link="#">M</button>
                <button class="size" aria-pressed="false" data-link="#">L</button>
                <button class="size" aria-pressed="false" data-link="#">XL</button>
            </div>
            <button class="buy-btn" type="button" data-link="#" disabled>Comprar →</button>
        </div>
    </article>

    <!-- Producte SENSE talles (vinil/disc) -->
    <article class="product">
        <div class="product-media">
            <img src="./assets/vinil.jpg" alt="Vinil — Títol del disc">
        </div>
        <div class="product-body">
            <p class="product-name">Vinil — Títol del disc</p>
            <p class="product-price">18 €</p>
            <a class="buy-btn" href="#">Comprar →</a>
        </div>
    </article>

</div>
    <footer>
        <p><span>© 2026</span> Mamut Galàctic Records</p>
        <p><img alt="Logo de Mamut Galàctic" src="./assets/favicon-16x16-light.png" /></p>
        <p>web by alerogcoder</p>
    </footer>
</div>
</body>
</html>
